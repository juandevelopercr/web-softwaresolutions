<svg viewBox="0 0 1920 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1a10"/>
      <stop offset="50%" stop-color="#0a2218"/>
      <stop offset="100%" stop-color="#061a12"/>
    </linearGradient>
    <radialGradient id="spot1" cx="65%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0c1a10" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="15%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0c1a10" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#bg)"/>
  <rect width="1920" height="900" fill="url(#spot1)"/>
  <rect width="1920" height="900" fill="url(#spot2)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1440" y1="0" x2="1440" y2="900"/>
  </g>

  <!-- Teal rings -->
  <circle cx="1400" cy="250" r="320" fill="#14b8a6" fill-opacity="0.04"/>
  <circle cx="1400" cy="250" r="200" fill="#14b8a6" fill-opacity="0.05"/>
  <circle cx="1400" cy="250" r="100" fill="#14b8a6" fill-opacity="0.07"/>
  <circle cx="400" cy="650" r="180" fill="#0d9488" fill-opacity="0.06"/>

  <!-- ERP Aduanas oriented decorative nodes -->
  <g opacity="0.3">
    <rect x="1050" y="150" width="120" height="42" rx="8" fill="rgba(20,184,166,0.2)" stroke="rgba(20,184,166,0.4)" stroke-width="1"/>
    <text x="1110" y="175" font-size="13" fill="#5eead4" text-anchor="middle">TICA XML ✓</text>
    <rect x="1200" y="230" width="140" height="42" rx="8" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
    <text x="1270" y="255" font-size="13" fill="#93c5fd" text-anchor="middle">RECAUCA 3.0 ✓</text>
    <rect x="1380" y="170" width="110" height="42" rx="8" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <text x="1435" y="195" font-size="13" fill="#d8b4fe" text-anchor="middle">Zona Franca</text>
    <rect x="1320" y="290" width="130" height="42" rx="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
    <text x="1385" y="315" font-size="13" fill="#fdba74" text-anchor="middle">Almacén Fiscal</text>
  </g>

  <!-- Connection lines between nodes -->
  <g stroke="rgba(20,184,166,0.12)" stroke-width="1" stroke-dasharray="5,5">
    <line x1="1170" y1="192" x2="1200" y2="230"/>
    <line x1="1340" y1="250" x2="1380" y2="170"/>
    <line x1="1490" y1="212" x2="1450" y2="290"/>
  </g>

  <!-- Container shapes (subtle) -->
  <g opacity="0.06" stroke="rgba(20,184,166,0.6)" stroke-width="2" fill="none">
    <rect x="1550" y="400" width="120" height="70" rx="4"/>
    <rect x="1690" y="400" width="120" height="70" rx="4"/>
    <rect x="1550" y="490" width="120" height="70" rx="4"/>
    <rect x="1690" y="490" width="120" height="70" rx="4"/>
  </g>
</svg>
