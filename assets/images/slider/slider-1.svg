<svg viewBox="0 0 1920 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#0f2a52"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot1" cx="70%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="20%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#bg)"/>
  <rect width="1920" height="900" fill="url(#spot1)"/>
  <rect width="1920" height="900" fill="url(#spot2)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="1920" y2="150"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="0" y1="450" x2="1920" y2="450"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="750" x2="1920" y2="750"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
    <line x1="1600" y1="0" x2="1600" y2="900"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1500" cy="200" r="300" fill="#3b82f6" fill-opacity="0.05"/>
  <circle cx="1500" cy="200" r="180" fill="#3b82f6" fill-opacity="0.06"/>
  <circle cx="1500" cy="200" r="80" fill="#3b82f6" fill-opacity="0.08"/>
  <circle cx="300" cy="700" r="200" fill="#7c3aed" fill-opacity="0.06"/>

  <!-- Abstract tech lines -->
  <g stroke="rgba(59,130,246,0.15)" stroke-width="1.5" fill="none">
    <polyline points="800,100 900,200 1000,150 1100,280 1300,200"/>
    <polyline points="900,300 1050,380 1200,320 1400,420"/>
    <circle cx="900" cy="200" r="5" fill="#3b82f6" fill-opacity="0.5"/>
    <circle cx="1050" cy="380" r="5" fill="#3b82f6" fill-opacity="0.5"/>
    <circle cx="1200" cy="320" r="5" fill="#3b82f6" fill-opacity="0.5"/>
  </g>

  <!-- Floating data nodes -->
  <g opacity="0.35">
    <rect x="1100" y="120" width="90" height="40" rx="8" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
    <text x="1145" y="144" font-size="12" fill="#93c5fd" text-anchor="middle">ERP ✓</text>
    <rect x="1220" y="200" width="110" height="40" rx="8" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
    <text x="1275" y="224" font-size="12" fill="#86efac" text-anchor="middle">Hacienda ✓</text>
    <rect x="1350" y="140" width="100" height="40" rx="8" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <text x="1400" y="164" font-size="12" fill="#d8b4fe" text-anchor="middle">TICA ✓</text>
    <rect x="1450" y="280" width="120" height="40" rx="8" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
    <text x="1510" y="304" font-size="12" fill="#fdba74" text-anchor="middle">15+ módulos</text>
  </g>

  <!-- Costa Rica map outline (very subtle) -->
  <g opacity="0.04" fill="#fff">
    <ellipse cx="1700" cy="500" rx="140" ry="200" transform="rotate(-20,1700,500)"/>
  </g>
</svg>
