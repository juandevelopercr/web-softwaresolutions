<svg viewBox="0 0 1920 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a28"/>
      <stop offset="50%" stop-color="#200d35"/>
      <stop offset="100%" stop-color="#150820"/>
    </linearGradient>
    <radialGradient id="spot1" cx="60%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1a0a28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="20%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a0a28" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#bg)"/>
  <rect width="1920" height="900" fill="url(#spot1)"/>
  <rect width="1920" height="900" fill="url(#spot2)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="225" x2="1920" y2="225"/>
    <line x1="0" y1="450" x2="1920" y2="450"/>
    <line x1="0" y1="675" x2="1920" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1440" y1="0" x2="1440" y2="900"/>
  </g>

  <!-- Purple rings — development/apps theme -->
  <circle cx="1380" cy="280" r="330" fill="#7c3aed" fill-opacity="0.04"/>
  <circle cx="1380" cy="280" r="200" fill="#7c3aed" fill-opacity="0.05"/>
  <circle cx="1380" cy="280" r="90" fill="#7c3aed" fill-opacity="0.08"/>
  <circle cx="350" cy="620" r="200" fill="#ec4899" fill-opacity="0.05"/>

  <!-- Dev/services nodes -->
  <g opacity="0.32">
    <rect x="1060" y="140" width="110" height="42" rx="8" fill="rgba(168,85,247,0.2)" stroke="rgba(168,85,247,0.45)" stroke-width="1"/>
    <text x="1115" y="165" font-size="13" fill="#d8b4fe" text-anchor="middle">Apps Móviles</text>
    <rect x="1210" y="210" width="130" height="42" rx="8" fill="rgba(59,130,246,0.18)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
    <text x="1275" y="235" font-size="13" fill="#93c5fd" text-anchor="middle">Desarrollo Web</text>
    <rect x="1380" y="155" width="120" height="42" rx="8" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.35)" stroke-width="1"/>
    <text x="1440" y="180" font-size="13" fill="#f9a8d4" text-anchor="middle">E-Commerce</text>
    <rect x="1350" y="270" width="130" height="42" rx="8" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
    <text x="1415" y="295" font-size="13" fill="#86efac" text-anchor="middle">Nube / Cloud</text>
  </g>

  <!-- Code lines decoration -->
  <g opacity="0.08" font-size="14" fill="#a78bfa" font-family="monospace">
    <text x="1500" y="380">const erp = new SoftwareSolutions();</text>
    <text x="1500" y="408">erp.connect('TICA').enable('FE');</text>
    <text x="1500" y="436">await erp.deploy({ env: 'production' });</text>
    <text x="1500" y="464">// ✓ Costa Rica ready</text>
  </g>

  <!-- Floating phone shapes (apps theme) -->
  <g opacity="0.07" stroke="#a78bfa" stroke-width="2" fill="none">
    <rect x="1600" y="480" width="60" height="100" rx="10"/>
    <rect x="1680" y="460" width="60" height="100" rx="10"/>
    <rect x="1760" y="490" width="60" height="100" rx="10"/>
  </g>
</svg>
